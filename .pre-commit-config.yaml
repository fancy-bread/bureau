repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (unit + integration)
        entry: pytest tests/unit tests/integration -x -q
        language: system
        pass_filenames: false
        always_run: true
