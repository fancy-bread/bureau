name: E2E Tests (Python)

on:
  workflow_dispatch:

jobs:
  e2e-python:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout bureau
        uses: actions/checkout@v4
        with:
          path: .

      - name: Checkout bureau-test-python
        uses: actions/checkout@v4
        with:
          repository: fancy-bread/bureau-test-python
          path: bureau-test-python
          token: ${{ secrets.BUREAU_TEST_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Configure git identity and credentials
        run: |
          git config --global user.email "bureau-ci@github-actions"
          git config --global user.name "Bureau CI"
          git config --global url."https://x-access-token:${{ secrets.BUREAU_TEST_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install bureau with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --timeout=650
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUREAU_TEST_REPO_PYTHON: ${{ github.workspace }}/bureau-test-python
          GH_TOKEN: ${{ secrets.BUREAU_TEST_PAT }}
