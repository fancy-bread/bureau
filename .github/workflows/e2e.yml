name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bureau
        uses: actions/checkout@v4
        with:
          path: .

      - name: Checkout bureau-test
        uses: actions/checkout@v4
        with:
          repository: fancy-bread/bureau-test
          path: bureau-test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Configure git identity
        run: |
          git config --global user.email "bureau-ci@github-actions"
          git config --global user.name "Bureau CI"

      - name: Install bureau with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --timeout=650
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUREAU_TEST_REPO: ${{ github.workspace }}/bureau-test
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
